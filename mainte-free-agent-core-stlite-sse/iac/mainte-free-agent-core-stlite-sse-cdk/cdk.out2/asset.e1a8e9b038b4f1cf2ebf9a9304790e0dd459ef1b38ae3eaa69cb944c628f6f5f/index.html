<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AgentCore Chat</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.73.0/build/stlite.css" />
</head>
<body>
  <div id="root"></div>
  <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.73.0/build/stlite.js"></script>
  <script>
    const cookies = document.cookie;
    const cookieObj = {};
    cookies.split(";").forEach(c => {
      const [k, ...v] = c.trim().split("=");
      if (k) cookieObj[k.trim()] = v.join("=");
    });

    async function loadAndMount() {
      // S3 上のパス → stlite ファイルシステム上のパス
      const fileMap = {
        "app.py": "app.py",
        "__init__.py": "stlite/__init__.py",
        "cookie_parser.py": "stlite/cookie_parser.py",
        "sigv4.py": "stlite/sigv4.py",
        "credentials.py": "stlite/credentials.py",
        "sse_handler.py": "stlite/sse_handler.py",
      };
      const files = { "runtime_cookies.json": JSON.stringify(cookieObj) };
      for (const [s3Path, mountPath] of Object.entries(fileMap)) {
        const resp = await fetch("./" + s3Path, { credentials: "same-origin" });
        files[mountPath] = resp.ok ? await resp.text() : "";
      }
      stlite.mount({ entrypoint: "app.py", files });
    }
    loadAndMount();
  </script>
</body>
</html>
