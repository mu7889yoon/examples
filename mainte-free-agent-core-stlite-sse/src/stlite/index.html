<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AgentCore Chat</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.73.0/build/stlite.css" />
</head>
<body>
  <div id="root"></div>
  <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.73.0/build/stlite.js"></script>
  <script>
    async function loadAndMount() {
      // Cookie を JSON としてマウント（Pyodide から document.cookie にアクセスできないため）
      const cookieObj = {};
      document.cookie.split(";").forEach(c => {
        const [k, ...v] = c.trim().split("=");
        if (k) cookieObj[k.trim()] = v.join("=");
      });

      const files_to_fetch = [
        "app.py",
        "__init__.py",
        "config.py",
        "cookie_parser.py",
        "sigv4.py",
        "credentials.py",
        "sse_handler.py",
        "agent_client.py",
      ];
      const files = { "runtime_cookies.json": JSON.stringify(cookieObj) };
      for (const filename of files_to_fetch) {
        const mountPath = filename === "app.py" ? "app.py" : "stlite/" + filename;
        const resp = await fetch("./" + filename, { credentials: "same-origin" });
        files[mountPath] = resp.ok ? await resp.text() : "";
      }
      stlite.mount({ entrypoint: "app.py", files });
    }
    loadAndMount();
  </script>
</body>
</html>
